<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .header, .footer {
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 15px;
        }
        .content {
            display: flex;
            flex-grow: 1;
        }
        .left-panel {
            width: 20%;
            background-color: #f8f9fa;
            padding: 15px;
            overflow-y: auto;
        }
        .middle-panel {
            flex-grow: 1;
            padding: 15px;
            border-left: 1px solid #ccc;
            border-right: 1px solid #ccc;
        }
        .right-panel {
            width: 20%;
            background-color: #f8f9fa;
            padding: 15px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .topic-header {
            font-weight: bold;
            cursor: pointer;
            padding: 8px;
            background-color: #e9ecef;
            margin-top: 5px;
            border-radius: 5px;
        }
        .topic-content {
            display: none;
            padding-left: 10px;
        }
    </style>
    <script>
        function toggleTopic(id) {
            var content = document.getElementById(id);
            if (content.style.display === "none" || content.style.display === "") {
                content.style.display = "block";
            } else {
                content.style.display = "none";
            }
        }
        
        window.onload = function() {
            document.getElementById('topic1-content').style.display = 'block';
        };
    </script>
</head>
<body>
    <div class="header">
        <h1>Welcome to My Tutorial Website</h1>
    </div>
    <div class="content">
        <div class="left-panel">
            <h4>Trending Topics</h4>
            <div class="topic-header" onclick="toggleTopic('topic1-content')">Topic 1</div>
            <div id="topic1-content" class="topic-content">
                <a href="content1-1.html" target="content-frame">Subtopic 1.1</a>
                <a href="content1-2.html" target="content-frame">Subtopic 1.2</a>
            </div>
            <div class="topic-header" onclick="toggleTopic('topic2-content')">Topic 2</div>
            <div id="topic2-content" class="topic-content">
                <a href="content2-1.html" target="content-frame">Subtopic 2.1</a>
                <a href="content2-2.html" target="content-frame">Subtopic 2.2</a>
            </div>
        </div>
        <div class="middle-panel">
            <h4>Latest Posts</h4>
            <iframe name="content-frame" src="default.html"></iframe>
        </div>
        <div class="right-panel">
            <h4>Announcements & Ads</h4>
            <p>Latest news and updates here.</p>
            <p>Sponsored Ads and promotions.</p>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2025 My Tutorial Website. All rights reserved.</p>
    </div>
</body>
